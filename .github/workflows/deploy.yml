name: Deploy to ECS

# push 到 main 自动部署；也可在 Actions 页手动点 Run workflow。
on:
  push:
    branches: [main]
  workflow_dispatch:

# 避免多次 push 并发部署互相打架。
concurrency:
  group: deploy-ecs
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 20m
          script: |
            set -e
            cd /root/map_project
            git fetch --all --prune
            git reset --hard origin/main
            docker compose up -d --build
            docker image prune -f
